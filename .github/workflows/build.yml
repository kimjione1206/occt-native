name: Build OCCT Native

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    name: Windows MSVC Build
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: "a34c873a9717a888f58dc05268dea15592c2f0ff"
        vcpkgJsonGlob: "vcpkg.json"

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg_installed
          ${{ env.VCPKG_ROOT }}/installed
        key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-windows-

    - name: Configure CMake
      run: >
        cmake -S . -B build
        -G "Visual Studio 17 2022"
        -A x64
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: occt-native-windows
        path: |
          build/${{ env.BUILD_TYPE }}/occt_native.exe
          build/${{ env.BUILD_TYPE }}/*.dll
        if-no-files-found: warn
        retention-days: 30

  build-linux:
    name: Linux GCC Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          qt6-base-dev libqt6charts6-dev \
          libgl1-mesa-dev

    - name: Configure CMake
      run: >
        cmake -S . -B build
        -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_CXX_COMPILER=g++

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: occt-native-linux
        path: build/occt_native
        if-no-files-found: warn
        retention-days: 30
