name: GUI Smoke Test & CLI Log Capture

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.2'

jobs:
  cli-log-test:
    name: CLI Log Tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: 'qtcharts'
        cache: true

    - name: Configure CMake (CLI mode)
      run: >
        cmake -B build
        -G "Visual Studio 17 2022"
        -A x64
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
        -DOCCT_CONSOLE=ON

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Run CLI tests with log capture
      shell: pwsh
      run: |
        $PSNativeCommandUseErrorActionPreference = $false
        $ErrorActionPreference = 'Continue'

        $exe = "build/${{ env.BUILD_TYPE }}/occt_native.exe"
        Write-Host "Running CLI tests with exe: $exe"

        Write-Host "`n=== CPU Test (AVX2) ==="
        & $exe --cli --test cpu --mode avx2 --duration 5 --threads 2 2>&1 | Tee-Object -FilePath cli_cpu.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== RAM Test (March C) ==="
        & $exe --cli --test ram --mode march_c --passes 1 --memory-pct 5 --duration 5 2>&1 | Tee-Object -FilePath cli_ram.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== Storage Test (Seq Write) ==="
        & $exe --cli --test storage --mode seq_write --duration 5 --file-size 64 2>&1 | Tee-Object -FilePath cli_storage.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== Storage Test (Verify Seq) ==="
        & $exe --cli --test storage --mode verify_seq --file-size 64 2>&1 | Tee-Object -FilePath cli_storage_verify.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== Benchmark Test (CPU) ==="
        & $exe --cli --test benchmark --bench-type cpu --duration 5 2>&1 | Tee-Object -FilePath cli_benchmark.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== Monitor Test (CSV) ==="
        & $exe --cli --monitor-only --duration 3 --csv 2>&1 | Tee-Object -FilePath cli_monitor.log
        Write-Host "Exit code: $LASTEXITCODE"

        Write-Host "`n=== PSU Test (Steady) ==="
        & $exe --cli --test psu --mode steady --duration 5 2>&1 | Tee-Object -FilePath cli_psu.log
        $psuExit = $LASTEXITCODE
        Write-Host "Exit code: $psuExit"
        if ($psuExit -ne 0 -and $psuExit -ne 2) {
          Write-Error "PSU test failed with unexpected exit code: $psuExit"
          exit 1
        }

        Write-Host "`n=== GPU Test (Matrix) ==="
        & $exe --cli --test gpu --mode matrix --duration 5 2>&1 | Tee-Object -FilePath cli_gpu.log
        $gpuExit = $LASTEXITCODE
        Write-Host "Exit code: $gpuExit"
        if ($gpuExit -ne 0 -and $gpuExit -ne 2) {
          Write-Error "GPU test failed with unexpected exit code: $gpuExit"
          exit 1
        }

        Write-Host "`nAll CLI tests completed!"
        exit 0

    - name: Upload CLI test logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cli-test-logs
        path: "*.log"
        if-no-files-found: warn

  gui-screenshot-test:
    name: GUI Screenshot Test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: 'qtcharts'
        cache: true

    - name: Configure CMake (GUI mode)
      run: >
        cmake -B build
        -G "Visual Studio 17 2022"
        -A x64
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Deploy Qt Dependencies
      shell: pwsh
      run: |
        $exe = "build/${{ env.BUILD_TYPE }}/occt_native.exe"
        & windeployqt --release --no-translations --no-opengl-sw $exe
        Write-Host "Qt dependencies deployed to: build/${{ env.BUILD_TYPE }}/"

    - name: Run GUI tests with screenshots
      shell: pwsh
      continue-on-error: true
      run: |
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName UIAutomationClient
        Add-Type -AssemblyName UIAutomationTypes

        Add-Type @"
        using System;
        using System.Runtime.InteropServices;
        public class Win32 {
            [DllImport("user32.dll")]
            public static extern bool SetCursorPos(int X, int Y);
            [DllImport("user32.dll")]
            public static extern void mouse_event(uint dwFlags, int dx, int dy, uint dwData, int dwExtraInfo);
            [DllImport("user32.dll")]
            public static extern bool SetForegroundWindow(IntPtr hWnd);
            [DllImport("user32.dll")]
            public static extern bool GetWindowRect(IntPtr hWnd, out RECT lpRect);
            [DllImport("user32.dll")]
            public static extern bool ShowWindow(IntPtr hWnd, int nCmdShow);
            [StructLayout(LayoutKind.Sequential)]
            public struct RECT {
                public int Left, Top, Right, Bottom;
            }
            public const uint MOUSEEVENTF_LEFTDOWN = 0x0002;
            public const uint MOUSEEVENTF_LEFTUP = 0x0004;
            public const int SW_MAXIMIZE = 3;
            public static void Click(int x, int y) {
                SetCursorPos(x, y);
                System.Threading.Thread.Sleep(100);
                mouse_event(MOUSEEVENTF_LEFTDOWN, 0, 0, 0, 0);
                mouse_event(MOUSEEVENTF_LEFTUP, 0, 0, 0, 0);
            }
        }
        "@

        function Take-Screenshot($name) {
            Start-Sleep -Milliseconds 500
            $screen = [System.Windows.Forms.Screen]::PrimaryScreen
            $bitmap = New-Object System.Drawing.Bitmap($screen.Bounds.Width, $screen.Bounds.Height)
            $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphics.CopyFromScreen($screen.Bounds.Location, [System.Drawing.Point]::Empty, $screen.Bounds.Size)
            $bitmap.Save("screenshots\$name.png")
            $graphics.Dispose()
            $bitmap.Dispose()
            Write-Host "  >> Screenshot: $name.png"
        }

        function Click-SidebarPanel($panelName) {
            [Win32]::SetForegroundWindow($hwnd)
            $y = $panelButtons[$panelName]
            [Win32]::Click($sidebarX, $y)
            Start-Sleep -Seconds 1
            Write-Host "  Switched to panel: $panelName"
        }

        function Click-StartButton() {
            # Start button: bottom of left settings panel (320px wide, starts at sidebar end)
            # X = center of settings panel = winX + 220(sidebar) + 160(half of 320)
            # Y = try UI Automation first, then fall back to position scan
            [Win32]::SetForegroundWindow($hwnd)

            $clicked = $false
            try {
                # Try UI Automation: find "Start Test" button
                $root = [System.Windows.Automation.AutomationElement]::RootElement
                $procCondition = New-Object System.Windows.Automation.PropertyCondition(
                    [System.Windows.Automation.AutomationElement]::ProcessIdProperty, $proc.Id)
                $appWin = $root.FindFirst([System.Windows.Automation.TreeScope]::Children, $procCondition)
                if ($appWin) {
                    # Search for button named "Start Test"
                    $btnCondition = New-Object System.Windows.Automation.AndCondition(
                        (New-Object System.Windows.Automation.PropertyCondition(
                            [System.Windows.Automation.AutomationElement]::ControlTypeProperty,
                            [System.Windows.Automation.ControlType]::Button)),
                        (New-Object System.Windows.Automation.PropertyCondition(
                            [System.Windows.Automation.AutomationElement]::NameProperty, "Start Test"))
                    )
                    $startBtn = $appWin.FindFirst([System.Windows.Automation.TreeScope]::Descendants, $btnCondition)
                    if ($startBtn) {
                        $invokePattern = $startBtn.GetCurrentPattern([System.Windows.Automation.InvokePattern]::Pattern)
                        $invokePattern.Invoke()
                        $clicked = $true
                        Write-Host "  Start button clicked via UI Automation"
                    }

                    # Also try "Run Benchmark" for benchmark panel
                    if (!$clicked) {
                        $btnCondition2 = New-Object System.Windows.Automation.AndCondition(
                            (New-Object System.Windows.Automation.PropertyCondition(
                                [System.Windows.Automation.AutomationElement]::ControlTypeProperty,
                                [System.Windows.Automation.ControlType]::Button)),
                            (New-Object System.Windows.Automation.PropertyCondition(
                                [System.Windows.Automation.AutomationElement]::NameProperty, "Run Benchmark"))
                        )
                        $benchBtn = $appWin.FindFirst([System.Windows.Automation.TreeScope]::Descendants, $btnCondition2)
                        if ($benchBtn) {
                            $invokePattern = $benchBtn.GetCurrentPattern([System.Windows.Automation.InvokePattern]::Pattern)
                            $invokePattern.Invoke()
                            $clicked = $true
                            Write-Host "  Run Benchmark button clicked via UI Automation"
                        }
                    }
                }
            } catch {
                Write-Host "  UI Automation failed: $($_.Exception.Message)"
            }

            if (!$clicked) {
                # Fallback: click at estimated position
                $btnX = $winX + 380
                # Scan bottom area of settings panel for the button
                foreach ($tryY in @(($winY + $winH - 80), ($winY + $winH - 120), ($winY + $winH - 60))) {
                    [Win32]::Click($btnX, $tryY)
                    Write-Host "  Fallback click at ($btnX, $tryY)"
                    Start-Sleep -Milliseconds 300
                }
            }
        }

        function Click-StopButton() {
            [Win32]::SetForegroundWindow($hwnd)
            try {
                $root = [System.Windows.Automation.AutomationElement]::RootElement
                $procCondition = New-Object System.Windows.Automation.PropertyCondition(
                    [System.Windows.Automation.AutomationElement]::ProcessIdProperty, $proc.Id)
                $appWin = $root.FindFirst([System.Windows.Automation.TreeScope]::Children, $procCondition)
                if ($appWin) {
                    $btnCondition = New-Object System.Windows.Automation.AndCondition(
                        (New-Object System.Windows.Automation.PropertyCondition(
                            [System.Windows.Automation.AutomationElement]::ControlTypeProperty,
                            [System.Windows.Automation.ControlType]::Button)),
                        (New-Object System.Windows.Automation.PropertyCondition(
                            [System.Windows.Automation.AutomationElement]::NameProperty, "Stop Test"))
                    )
                    $stopBtn = $appWin.FindFirst([System.Windows.Automation.TreeScope]::Descendants, $btnCondition)
                    if ($stopBtn) {
                        $invokePattern = $stopBtn.GetCurrentPattern([System.Windows.Automation.InvokePattern]::Pattern)
                        $invokePattern.Invoke()
                        Write-Host "  Stop button clicked via UI Automation"
                        return
                    }
                }
            } catch {}
            # Fallback
            $btnX = $winX + 380
            [Win32]::Click($btnX, ($winY + $winH - 80))
            Write-Host "  Stop button fallback click"
        }

        # ── Setup ──
        New-Item -ItemType Directory -Force -Path screenshots | Out-Null

        # Launch the app
        Write-Host "=== Launching OCCT Native GUI ==="
        $proc = Start-Process -FilePath "build\Release\occt_native.exe" -PassThru
        Start-Sleep -Seconds 6

        # Maximize the window for consistent screenshots
        $hwnd = $proc.MainWindowHandle
        [Win32]::ShowWindow($hwnd, [Win32]::SW_MAXIMIZE)
        Start-Sleep -Seconds 1
        [Win32]::SetForegroundWindow($hwnd)

        $rect = New-Object Win32+RECT
        [Win32]::GetWindowRect($hwnd, [ref]$rect)
        $winX = $rect.Left
        $winY = $rect.Top
        $winW = $rect.Right - $rect.Left
        $winH = $rect.Bottom - $rect.Top
        Write-Host "Window maximized: ${winX},${winY} size ${winW}x${winH}"

        # Sidebar nav button positions (relative to window)
        $sidebarX = $winX + 110
        $panelButtons = @{
            "dashboard" = $winY + 100
            "cpu"       = $winY + 145
            "gpu"       = $winY + 190
            "ram"       = $winY + 235
            "storage"   = $winY + 280
            "psu"       = $winY + 325
            "schedule"  = $winY + 390
            "benchmark" = $winY + 435
            "certificate" = $winY + 480
            "monitor"   = $winY + 545
            "sysinfo"   = $winY + 590
            "results"   = $winY + 635
        }

        # ── 1. Dashboard ──
        Write-Host "`n=== 1. Dashboard ==="
        Take-Screenshot "01_dashboard_initial"

        # ── 2. CPU Test ──
        Write-Host "`n=== 2. CPU Panel - Start Test ==="
        Click-SidebarPanel "cpu"
        Take-Screenshot "02_cpu_before_start"

        Click-StartButton
        Start-Sleep -Seconds 3
        Take-Screenshot "03_cpu_running_3s"
        Start-Sleep -Seconds 5
        Take-Screenshot "04_cpu_running_8s"
        Start-Sleep -Seconds 5
        Take-Screenshot "05_cpu_running_13s"

        Click-StopButton
        Start-Sleep -Seconds 2
        Take-Screenshot "06_cpu_stopped"

        # ── 3. RAM Test ──
        Write-Host "`n=== 3. RAM Panel - Start Test ==="
        Click-SidebarPanel "ram"
        Take-Screenshot "07_ram_before_start"

        Click-StartButton
        Start-Sleep -Seconds 3
        Take-Screenshot "08_ram_running_3s"
        Start-Sleep -Seconds 5
        Take-Screenshot "09_ram_running_8s"
        Start-Sleep -Seconds 5
        Take-Screenshot "10_ram_running_13s"

        Click-StopButton
        Start-Sleep -Seconds 2
        Take-Screenshot "11_ram_stopped"

        # ── 4. Storage Test ──
        Write-Host "`n=== 4. Storage Panel - Start Test ==="
        Click-SidebarPanel "storage"
        Take-Screenshot "12_storage_before_start"

        Click-StartButton
        Start-Sleep -Seconds 3
        Take-Screenshot "13_storage_running_3s"
        Start-Sleep -Seconds 5
        Take-Screenshot "14_storage_running_8s"

        Click-StopButton
        Start-Sleep -Seconds 2
        Take-Screenshot "15_storage_stopped"

        # ── 5. GPU Panel (expect backend unavailable) ──
        Write-Host "`n=== 5. GPU Panel ==="
        Click-SidebarPanel "gpu"
        Take-Screenshot "16_gpu_panel"

        Click-StartButton
        Start-Sleep -Seconds 2
        Take-Screenshot "17_gpu_after_start_attempt"

        # ── 6. PSU Panel ──
        Write-Host "`n=== 6. PSU Panel - Start Test ==="
        Click-SidebarPanel "psu"
        Take-Screenshot "18_psu_before_start"

        Click-StartButton
        Start-Sleep -Seconds 3
        Take-Screenshot "19_psu_running_3s"
        Start-Sleep -Seconds 5
        Take-Screenshot "20_psu_running_8s"

        Click-StopButton
        Start-Sleep -Seconds 2
        Take-Screenshot "21_psu_stopped"

        # ── 7. Benchmark ──
        Write-Host "`n=== 7. Benchmark Panel ==="
        Click-SidebarPanel "benchmark"
        Take-Screenshot "22_benchmark_before_start"

        Click-StartButton
        Start-Sleep -Seconds 5
        Take-Screenshot "23_benchmark_running_5s"
        Start-Sleep -Seconds 10
        Take-Screenshot "24_benchmark_running_15s"
        Start-Sleep -Seconds 10
        Take-Screenshot "25_benchmark_done"

        # ── 8. Monitor Panel (sensors) ──
        Write-Host "`n=== 8. Monitor Panel ==="
        Click-SidebarPanel "monitor"
        Start-Sleep -Seconds 3
        Take-Screenshot "26_monitor_sensors"

        # ── 9. System Info ──
        Write-Host "`n=== 9. System Info Panel ==="
        Click-SidebarPanel "sysinfo"
        Start-Sleep -Seconds 2
        Take-Screenshot "27_sysinfo"

        # ── 10. Dashboard after tests ──
        Write-Host "`n=== 10. Dashboard Final ==="
        Click-SidebarPanel "dashboard"
        Start-Sleep -Seconds 2
        Take-Screenshot "28_dashboard_final"

        # Cleanup
        Write-Host "`n=== Closing application ==="
        $proc.CloseMainWindow()
        Start-Sleep -Seconds 3
        if (!$proc.HasExited) { $proc.Kill() }

        $count = (Get-ChildItem screenshots\*.png).Count
        Write-Host "`nGUI smoke test complete! $count screenshots captured."

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gui-screenshots
        path: screenshots/
        if-no-files-found: warn
        retention-days: 30
